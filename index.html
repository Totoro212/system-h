<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>ARISE</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- DASHBOARD -->
        <section id="page-dashboard" class="page active">
            <div class="header">
                <h1 class="logo">ARISE ⚔️</h1>
                <div style="display:flex;align-items:center;gap:8px">
                    <div class="day-counter" id="day-counter">ДЕНЬ 1</div>
                    <button class="theme-toggle" id="theme-toggle">🌙</button>
                </div>
            </div>




            <div class="weekly-rule-card" id="weekly-rule-card" style="margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                    <div class="rule-header" style="margin-bottom: 0;">
                        <span style="font-size: 0.8rem;">🌀 ИСПЫТАНИЕ НЕДЕЛИ</span>
                    </div>
                    <span id="weekly-progress" style="color: var(--purple); font-weight: bold; font-family: var(--font-display); font-size: 0.9rem;">0/7</span>
                </div>
                <div class="rule-text" id="weekly-rule" style="margin-bottom: 16px;">Загрузка...</div>
                
                <div class="weekly-slots-container" id="weekly-slots">
                    <!-- 7 slots dynamically generated in JS -->
                </div>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button id="btn-open-training" style="flex: 1; background: linear-gradient(135deg, rgba(52, 211, 153, 0.1), rgba(16, 185, 129, 0.05)); border: 1px solid rgba(52, 211, 153, 0.3); color: var(--green); padding: 14px; border-radius: var(--radius-sm); font-family: var(--font-display); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 6px;">
                    <span style="font-size: 1.5rem;">💪</span>
                    <span>ТРЕНИРОВКИ</span>
                </button>
            </div>







            <div class="section-title-row" style="margin-top: 24px;">
                <h2 class="section-title">📋 Ежедневные квесты</h2>
                <button class="btn-edit-toggle" id="btn-edit-main">✏️</button>
            </div>
            <div class="quest-list" id="main-quests"></div>
            <button class="btn-add hidden" id="btn-add-main">+ Добавить квест</button>

            <!-- ВЫЗОВ ДНЯ — появляется под ежедневными квестами -->
            <div id="challenge-section" style="margin-top:10px;">

                <!-- Состояние 1: кнопка принять первый вызов -->
                <div id="challenge-offer" style="display:none;">
                    <button id="btn-accept-challenge" style="
                        width:100%; padding:13px 16px;
                        background:linear-gradient(135deg,rgba(168,85,247,.07),rgba(240,185,50,.05));
                        border:1px dashed rgba(168,85,247,.25);
                        border-radius:var(--radius);
                        color:var(--purple);
                        font-family:var(--font-d); font-weight:700; font-size:.85rem;
                        letter-spacing:.5px; cursor:pointer;
                        display:flex; align-items:center; justify-content:center; gap:8px;
                        transition:all .2s;">
                        ⚡ Принять вызов дня
                    </button>
                </div>

                <!-- Состояние 2: активный вызов + кнопка "добавить ещё" (если выполнен) -->
                <div id="challenge-accepted" style="display:none;">
                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                        <span style="font-family:var(--font-d);font-size:.72rem;color:var(--gold);letter-spacing:2px;">⚡ ВЫЗОВ ДНЯ</span>
                        <button id="btn-decline-challenge" style="font-size:.65rem;color:var(--text-3);background:none;border:1px solid var(--border);border-radius:6px;padding:2px 7px;cursor:pointer;font-family:var(--font-d);">✕ Отказаться</button>
                    </div>
                    <div class="quest-list" id="bonus-quests" style="margin-bottom:8px;"></div>
                    <!-- Кнопка добавить ещё — показывается только если текущий вызов выполнен -->
                    <div id="challenge-add-more" style="display:none;">
                        <button id="btn-add-more-challenge" style="
                            width:100%; padding:10px 14px;
                            background:rgba(240,185,50,.06);
                            border:1px dashed rgba(240,185,50,.25);
                            border-radius:var(--radius-sm);
                            color:var(--gold);
                            font-family:var(--font-d); font-weight:700; font-size:.78rem;
                            letter-spacing:.5px; cursor:pointer;
                            display:flex; align-items:center; justify-content:center; gap:6px;
                            transition:all .2s;">
                            + Добавить ещё вызов
                        </button>
                    </div>
                </div>

            </div>

        </section>



        <!-- CODEX -->
        <section id="page-codex" class="page">
            <div class="header">
                <h1>📜 КОДЕКС ОХОТНИКА</h1>
            </div>



            <!-- STOIC DAILY -->
            <div class="stoic-daily-card" id="stoic-daily-card" style="margin-bottom: 20px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                    <div style="font-size: 0.7rem; color: var(--purple); letter-spacing: 2px; font-family: var(--font-display);">⚔️ STOIC DAILY</div>
                    <div id="stoic-streak-badge" style="font-size: 0.7rem; background: rgba(168,85,247,0.15); border: 1px solid rgba(168,85,247,0.3); color: var(--purple); padding: 2px 8px; border-radius: 20px; font-family: var(--font-display);">0 дней</div>
                </div>
                <div id="stoic-daily-text" style="font-size: 1rem; color: var(--text-primary); font-style: italic; line-height: 1.6; margin-bottom: 6px;"></div>
                <div id="stoic-daily-author" style="font-size: 0.75rem; color: var(--text-dim); margin-bottom: 14px;"></div>
                <div id="stoic-daily-source" style="font-size: 0.72rem; color: rgba(168,85,247,0.6); margin-bottom: 14px;"></div>
                <div style="font-size: 0.75rem; color: var(--text-secondary); border-top: 1px solid var(--border-subtle); padding-top: 10px; margin-bottom: 10px;" id="stoic-practice-hint"></div>
            </div>

            <div class="section-title-row" style="margin-top:24px">
                <span class="section-title">📜 СВОД ПРАВИЛ</span>
            </div>
            <div id="codex-reference"></div>
        </section>

        <!-- FOCUS (REMOVED) -->

        <!-- TRAINING -->
        <section id="page-training" class="page" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: var(--bg-deep); z-index: 100;">
            <div class="header" style="align-items: center; margin-bottom: 12px;">
                <button id="btn-close-training" style="background: rgba(168, 85, 247, 0.1); border: 1px solid rgba(168, 85, 247, 0.2); color: var(--purple); width: 40px; height: 40px; border-radius: 12px; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;">◀</button>
                <div style="flex-grow: 1; text-align: right;">
                    <h1 style="margin: 0;">💪 ТРЕНИРОВКА</h1>
                    <div class="quest-date" id="train-day-label" style="font-size: 0.85rem; margin-top: 4px; display: inline-block;">PUSH</div>
                </div>
            </div>
            <div class="train-program-selector" id="train-program-selector">
                <button class="program-chip active" data-program="ppl">BASE (PPL)</button>
                <button class="program-chip" data-program="ul">SPLIT (U/L)</button>
                <button class="program-chip" data-program="extra">SUPPORT</button>
            </div>
            <div id="train-program-note" class="program-note">3-дневный базовый сплит (Push/Pull/Legs). Идеально для построения фундамента.</div>
            <div class="train-tabs-wrapper">
                <div class="train-tabs" id="train-tabs">
                    <!-- Tabs will be injected via JS -->
                </div>
            </div>
            <div id="train-content"></div>
        </section>



        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <button class="nav-btn active" data-page="dashboard">
                <span class="nav-icon">🏠</span>
                <span class="nav-label">Главная</span>
            </button>

            <button class="nav-btn" data-page="codex">
                <span class="nav-icon">📜</span>
                <span class="nav-label">Кодекс</span>
            </button>

        </nav>
    </div>






    <!-- Generic Info Modal -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal" id="info-modal">
            <div class="modal-glow"></div>
            <div class="modal-title" id="modal-title">Информация</div>
            <div class="modal-content" id="modal-content" style="white-space: pre-wrap; font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px; line-height: 1.5;"></div>
            <button class="modal-btn" id="modal-close">Понятно</button>
        </div>
    </div>

    <!-- Edit Quest Modal -->
    <div class="modal-overlay hidden" id="edit-modal-overlay">
        <div class="modal edit-modal">
            <div class="modal-glow"></div>
            <div class="modal-title" id="edit-modal-title">Редактировать</div>
            <div class="edit-form">
                <label class="edit-label">Иконка + Название
                    <input type="text" class="edit-input" id="edit-name" placeholder="🏋️ Тренировка">
                </label>
                <label class="edit-label">Описание
                    <input type="text" class="edit-input" id="edit-desc" placeholder="60 мин — силовая или кардио">
                </label>

            </div>
            <div class="edit-actions">
                <button class="modal-btn btn-secondary" id="edit-cancel">Отмена</button>
                <button class="modal-btn" id="edit-save">Сохранить</button>
            </div>
        </div>
    </div>




    <!-- CUSTOM CONFIRM MODAL -->
    <div id="confirm-overlay" class="modal-overlay hidden" style="z-index:600;">
        <div class="modal" style="max-width:320px;">
            <div class="modal-glow"></div>
            <div id="confirm-title" class="modal-title" style="font-size:1.1rem;margin-bottom:8px;"></div>
            <div id="confirm-text" style="font-size:0.85rem;color:var(--text-secondary);margin-bottom:20px;line-height:1.5;"></div>
            <div class="edit-actions">
                <button class="modal-btn btn-secondary" id="confirm-cancel">Отмена</button>
                <button class="modal-btn" id="confirm-ok" style="background:linear-gradient(135deg,var(--red),#dc2626);">Подтвердить</button>
            </div>
        </div>
    </div>



    <script src="app.js"></script>
</body>
</html>
